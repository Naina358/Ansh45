<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I'm Sorry Sneha ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff6fa5,#ffb6c1,#ffd6e8);
}

.card{
position:relative;
width:90%;
max-width:800px;
padding:30px;
text-align:center;
border-radius:25px;
background:rgba(255,255,255,.18);
backdrop-filter:blur(10px);
box-shadow:0 0 30px rgba(255,255,255,.4);
z-index:10;
color:white;
}

h1{
font-size:42px;
text-shadow:0 0 20px white;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{text-shadow:0 0 10px white;}
to{text-shadow:0 0 25px white;}
}

h2{
margin-top:10px;
margin-bottom:20px;
}

#typing{
font-size:18px;
line-height:30px;
min-height:170px;
margin:20px 0;
}

button{
padding:15px 30px;
font-size:18px;
border:none;
border-radius:50px;
cursor:pointer;
margin:10px;
transition:.4s;
}

#yes{
background:#ff0066;
color:white;
}

#yes:hover{
transform:scale(1.1);
}

#no{
background:white;
color:#ff0066;
position:relative;
}

#speaker{
position:fixed;
bottom:25px;
left:50%;
transform:translateX(-50%);
width:75px;
height:75px;
border-radius:50%;
  /* -------- Floating Hearts -------- */

for(let j=0;j<35;j++){

let h=document.createElement("div");

h.className="heart";

h.innerHTML="❤️";

h.style.left=Math.random()*100+"vw";

h.style.top=Math.random()*100+"vh";

h.style.fontSize=(15+Math.random()*25)+"px";

h.style.animation=`float ${5+Math.random()*6}s linear infinite`;

document.body.appendChild(h);

}

/* Heart Animation */

const style=document.createElement("style");

style.innerHTML=`

@keyframes float{

0%{

transform:translateY(100vh);

opacity:0;

}

20%{

opacity:1;

}

100%{

transform:translateY(-120vh);

opacity:0;

}

}

@keyframes petals{

0%{

transform:translateY(-10vh) rotate(0deg);

}

100%{

transform:translateY(120vh) rotate(360deg);

}

}

`;

document.head.appendChild(style);

/* -------- Rose Petals -------- */

for(let j=0;j<25;j++){

let p=document.createElement("div");

p.className="petal";

p.innerHTML="🌹";

p.style.left=Math.random()*100+"vw";

p.style.fontSize=(18+Math.random()*18)+"px";

p.style.animation=`petals ${6+Math.random()*6}s linear infinite`;

document.body.appendChild(p);

}

/* -------- Moving Button -------- */

function moveButton(){

let b=document.getElementById("no");

b.style.position="absolute";

b.style.left=Math.random()*70+"%";

b.style.top=Math.random()*70+"%";

}

/* -------- Music -------- */

let ctx;

let playing=false;

let interval;

const melody=[523,659,784,659,587,698,880,698];

function toggleMusic(){

if(!ctx){

ctx=new(window.AudioContext||window.webkitAudioContext)();

}

if(!playing){

let i=0;

interval=setInterval(()=>{

let osc=ctx.createOscillator();

let gain=ctx.createGain();

osc.type="sine";

osc.frequency.value=melody[i];

gain.gain.value=0.05;

osc.connect(gain);

gain.connect(ctx.destination);

osc.start();

osc.stop(ctx.currentTime+0.35);

i=(i+1)%melody.length;

},400);

speaker.innerHTML="🔈";

playing=true;

}else{

clearInterval(interval);

speaker.innerHTML="🔊";

playing=false;

}

}

/* -------- Fireworks -------- */

const canvas=document.getElementById("canvas");

const c=canvas.getContext("2d");

canvas.width=window.innerWidth;

canvas.height=window.innerHeight;

let particles=[];

function fireworks(){

for(let i=0;i<220;i++){

particles.push({

x:canvas.width/2,

y:canvas.height/2,

vx:(Math.random()-0.5)*12,

vy:(Math.random()-0.5)*12,

life:100,

emoji:Math.random()>0.5?"✨":"❤️"

});

}

animate();

}

function animate(){

c.clearRect(0,0,canvas.width,canvas.height);

particles.forEach((p,index)=>{

c.font="22px Arial";

c.fillText(p.emoji,p.x,p.y);

p.x+=p.vx;

p.y+=p.vy;

p.vy+=0.05;

p.life--;

if(p.life<=0){

particles.splice(index,1);

}

});

if(particles.length>0){

requestAnimationFrame(animate);

}

}

/* -------- Forgive -------- */

function forgive(){

document.getElementById("message").style.display="block";

fireworks();

}

/* -------- Resize -------- */

window.onresize=function(){

canvas.width=window.innerWidth;

canvas.height=window.innerHeight;

}

</script>

</body>
</html>
