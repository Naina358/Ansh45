<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>I'm Sorry Sneha ❤️</title>
<style>
body{margin:0;font-family:Arial;background:linear-gradient(135deg,#ff7eb3,#ff758c);overflow:hidden;color:#fff}
.hearts span,.petals span{position:absolute;animation:float 10s linear infinite;font-size:24px}
.hearts span{color:#ffebf3}.petals span{color:#ffccd5}
@keyframes float{from{transform:translateY(100vh)}to{transform:translateY(-10vh)}}
.card{max-width:700px;margin:6vh auto;background:rgba(255,255,255,.18);backdrop-filter:blur(8px);padding:25px;border-radius:20px;text-align:center;box-shadow:0 0 20px rgba(0,0,0,.2)}
h1{animation:glow 1.5s infinite alternate}
@keyframes glow{from{text-shadow:0 0 8px #fff}to{text-shadow:0 0 22px #fff}}
.gallery img{width:120px;height:120px;object-fit:cover;border-radius:12px;margin:6px;background:#fff}
button{padding:12px 24px;border:none;border-radius:30px;margin:10px;font-size:18px;cursor:pointer}
#yes{background:#28a745;color:#fff}#no{background:#dc3545;color:#fff;position:relative}
#celebrate{display:none;font-size:28px}
canvas{position:fixed;inset:0;pointer-events:none}
</style>
</head>
<body>
<div class="hearts"></div><div class="petals"></div>
<div class="card">
<h1>I'm Sorry, Sneha ❤️</h1>
<p id="type"></p>
<div class="gallery">
<img src="https://via.placeholder.com/120?text=Photo+1">
<img src="https://via.placeholder.com/120?text=Photo+2">
<img src="https://via.placeholder.com/120?text=Photo+3">
</div>
<p><b>Dear Sneha,</b><br>I know I made mistakes and I'm truly sorry. I never wanted to hurt you. Please give me one chance to make things right. Your smile means everything to me. ❤️</p>
<button onclick="forgive()" id="yes">Forgive Me ❤️</button>
<button id="no" onmouseover="moveBtn()" ontouchstart="moveBtn()">Not Yet 😒</button>
<h2 id="celebrate">🎉 Thank You, Sneha! ❤️</h2>
</div>
<canvas id="c"></canvas>
<script>
const msg="Every heartbeat reminds me of you. I'm sincerely sorry, Sneha. ❤️";
let i=0;function t(){if(i<msg.length){type.textContent+=msg[i++];setTimeout(t,50)}};t();
for(let j=0;j<25;j++){let s=document.createElement("span");s.textContent="❤️";s.style.left=Math.random()*100+"%";s.style.animationDuration=(6+Math.random()*6)+"s";document.querySelector(".hearts").appendChild(s);}
for(let j=0;j<20;j++){let s=document.createElement("span");s.textContent="🌹";s.style.left=Math.random()*100+"%";s.style.animationDuration=(8+Math.random()*6)+"s";document.querySelector(".petals").appendChild(s);}
function moveBtn(){let b=no;b.style.position="absolute";b.style.left=Math.random()*70+"%";b.style.top=Math.random()*70+"%";}
function beep(){let a=new(window.AudioContext||window.webkitAudioContext)();let o=a.createOscillator(),g=a.createGain();o.type="sine";o.frequency.value=523;o.connect(g);g.connect(a.destination);g.gain.value=.05;o.start();o.frequency.exponentialRampToValueAtTime(659,a.currentTime+.2);o.frequency.exponentialRampToValueAtTime(784,a.currentTime+.5);o.stop(a.currentTime+.6);}
function forgive(){beep();celebrate.style.display="block";fireworks();}
function fireworks(){let c=document.getElementById("c"),x=c.getContext("2d");c.width=innerWidth;c.height=innerHeight;let p=[];for(let i=0;i<200;i++)p.push({x:c.width/2,y:c.height/2,vx:(Math.random()-.5)*8,vy:(Math.random()-.5)*8,l:80});let id=setInterval(()=>{x.clearRect(0,0,c.width,c.height);p.forEach(q=>{x.fillText("✨",q.x,q.y);q.x+=q.vx;q.y+=q.vy;q.l--;});p=p.filter(q=>q.l>0);if(!p.length){clearInterval(id);x.clearRect(0,0,c.width,c.height);}},30);}
</script>
</body></html>
