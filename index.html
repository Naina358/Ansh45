<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>❤️ I'm Sorry Sneha </title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:linear-gradient(135deg,#ff5f8f,#ff9ec4,#ffd1dc);

overflow:hidden;

height:100vh;

display:flex;

justify-content:center;

align-items:center;

}

/* Floating Hearts */

.heart{

position:absolute;

font-size:25px;

color:white;

animation:float 10s linear infinite;

opacity:.7;

}

@keyframes float{

0%{

transform:translateY(100vh);

}

100%{

transform:translateY(-120vh);

}

}

/* Rose Petals */

.petal{

position:absolute;

font-size:22px;

animation:petal 12s linear infinite;

}

@keyframes petal{

0%{

transform:translateY(-100px) rotate(0deg);

}

100%{

transform:translateY(120vh) rotate(360deg);

}

}

/* Main Card */

.card{

width:90%;

max-width:800px;

background:rgba(255,255,255,.15);

backdrop-filter:blur(15px);

border-radius:25px;

padding:25px;

text-align:center;

box-shadow:0 0 25px rgba(255,255,255,.4);

color:white;

animation:zoom 1.5s;

z-index:5;

}

@keyframes zoom{

from{

transform:scale(.4);

opacity:0;

}

to{

transform:scale(1);

opacity:1;

}

}

h1{

font-size:42px;

margin-bottom:10px;

text-shadow:0 0 20px white;

animation:glow 2s infinite alternate;

}

@keyframes glow{

from{

text-shadow:0 0 10px white;

}

to{

text-shadow:0 0 30px white;

}

}

h2{

margin-bottom:20px;

}

#typing{

font-size:18px;

line-height:30px;

min-height:160px;

margin-top:20px;

}

.gallery{

display:flex;

justify-content:center;

flex-wrap:wrap;

gap:12px;

margin:20px 0;

}

.gallery img{

width:180px;

height:180px;

object-fit:cover;

border-radius:18px;

border:4px solid white;

box-shadow:0 0 20px pink;

transition:.4s;

}

.gallery img:hover{

transform:scale(1.08);

}

button{

padding:15px 35px;

font-size:18px;

border:none;

border-radius:40px;

cursor:pointer;

margin:15px;

transition:.4s;

}

#yes{

background:#ff0066;

color:white;

}

#yes:hover{

background:#ff3385;

}

#no{

background:white;

color:#ff0066;

position:relative;

}

#message{

display:none;

margin-top:20px;

font-size:28px;

font-weight:bold;

color:white;

text-shadow:0 0 20px yellow;

}

canvas{

position:fixed;

top:0;

left:0;

pointer-events:none;

}

</style>

</head>

<body>

<canvas id="canvas"></canvas>

<div class="card">

<h1>❤️ I'm Sorry Sneha ❤️</h1>

<h2>Will You Please Forgive Me?</h2>

<div class="gallery">

<!-- Replace these with your own photo filenames -->
<img src="photo1.jpg">
<img src="photo2.jpg">
<img src="photo3.jpg">

</div>

<p id="typing"></p>

<button id="yes" onclick="forgive()">Forgive Me ❤️</button>

<button id="no" onmouseover="moveButton()" ontouchstart="moveButton()">

Not Yet 😒

</button>

<div id="message">

🎉 Thank You Sneha ❤️<br>

You made me the happiest person.<br>

I promise to never hurt you again.

</div>

</div>

<script>

const letter=`Dear Sneha ❤️,

I know I made mistakes.

I never wanted to hurt you.

Every day without your smile feels incomplete.

You're very precious to me.

Please forgive me.

I promise to become a better person and always respect your feelings.

Thank you for being such a beautiful part of my life.

❤️ Forever Yours,
Ansh ❤️`;

let i=0;

function type(){

if(i<letter.length){

document.getElementById("typing").innerHTML+=letter.charAt(i);

i++;

setTimeout(type,40);

}

}

type();/* ---------- Floating Hearts ---------- */

for(let i=0;i<30;i++){

let h=document.createElement("div");

h.className="heart";

h.innerHTML="❤️";

h.style.left=Math.random()*100+"vw";

h.style.animationDuration=(6+Math.random()*6)+"s";

h.style.fontSize=(15+Math.random()*25)+"px";

document.body.appendChild(h);

}

/* ---------- Rose Petals ---------- */

for(let i=0;i<25;i++){

let p=document.createElement("div");

p.className="petal";

p.innerHTML="🌹";

p.style.left=Math.random()*100+"vw";

p.style.animationDuration=(7+Math.random()*8)+"s";

document.body.appendChild(p);

}

/* ---------- Run Away Button ---------- */

function moveButton(){

let btn=document.getElementById("no");

btn.style.position="absolute";

btn.style.left=Math.random()*70+"%";

btn.style.top=Math.random()*70+"%";

}

/* ---------- Simple Romantic Tune ---------- */

let audioContext;

function playTune(){

if(audioContext)return;

audioContext=new(window.AudioContext||window.webkitAudioContext)();

const notes=[523,659,784,659,523,494,523,659];

let time=audioContext.currentTime;

notes.forEach(freq=>{

let osc=audioContext.createOscillator();

let gain=audioContext.createGain();

osc.type="sine";

osc.frequency.value=freq;

gain.gain.value=0.04;

osc.connect(gain);

gain.connect(audioContext.destination);

osc.start(time);

osc.stop(time+0.35);

time+=0.35;

});

}

/* ---------- Fireworks ---------- */

const canvas=document.getElementById("canvas");

const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;

canvas.height=window.innerHeight;

let particles=[];

function fireworks(){

for(let i=0;i<250;i++){

particles.push({

x:canvas.width/2,

y:canvas.height/2,

vx:(Math.random()-0.5)*12,

vy:(Math.random()-0.5)*12,

life:100,

emoji:Math.random()>0.5?"✨":"❤️"

});

}

animate();

}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach((p,index)=>{

ctx.font="22px Arial";

ctx.fillText(p.emoji,p.x,p.y);

p.x+=p.vx;

p.y+=p.vy;

p.vy+=0.05;

p.life--;

if(p.life<=0){

particles.splice(index,1);

}

});

if(particles.length>0){

requestAnimationFrame(animate);

}

}

/* ---------- Forgive Button ---------- */

function forgive(){

document.getElementById("message").style.display="block";

playTune();

fireworks();

}

/* ---------- Resize ---------- */

window.onresize=function(){

canvas.width=window.innerWidth;

canvas.height=window.innerHeight;

}

</script>

</body>

</html>
